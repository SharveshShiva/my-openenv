benchmark:
  name: "AI Insurance Claim Validation & Fraud Detection"
  description: "Environment to evaluate fraud detection agents."
  version: "1.0.0"

environment:
  type: "http"
  reset_endpoint: "/reset"
  step_endpoint: "/step"
  healthcheck_endpoint: "/state"

spaces:
  observation:
    type: "dict"
    schema:
      claim:
        type: "dict"
      difficulty:
        type: "string"

  action:
    type: "dict"
    schema:
      decision:
        type: "string"
        enum: ["APPROVE", "REJECT", "ESCALATE"]
      fraud_score:
        type: "float"
        minimum: 0.0
        maximum: 1.0
      reasoning:
        type: "string"

  reward:
    type: "float"
    range: [0.01, 0.99]

tasks:
  - id: "easy"
    description: "Simple claims"
    threshold: 0.65

  - id: "medium"
    description: "Moderate claims"
    threshold: 0.58

  - id: "hard"
    description: "Complex fraud cases"
    threshold: 0.52
